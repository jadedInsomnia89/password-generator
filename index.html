<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section id="generate-pwd">
        <h1>Generate a <span class="highlight">random password</span></h1>
        <h2>Never use an insecure password again.</h2>
        <form id="generate-pwd-form">
          <div class="pwd-reqs-container">
            <div class="pwd-reqs-row">
              <label for="pwd-length">Password Length</label>
              <input
                type="range"
                name="pwdLength"
                id="pwd-length"
                min="8"
                max="50"
                value="16"
                oninput="output.value = this.value"
              />
              <output id="output" for="pwd-length">16</output>
            </div>
            <div class="pwd-reqs-row">
              <label for="include-special-chars"
                >Include Special Characters</label
              >
              <input
                type="checkbox"
                name="includeSpecialChars"
                id="include-special-chars"
              />
            </div>
          </div>
          <button type="submit">Generate Passwords</button>
        </form>
      </section>
      <section id="pwd-results">
        <div class="pwd-tag"><p id="pwd-result-1"></p></div>
        <div class="pwd-tag"><p id="pwd-result-2"></p></div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
